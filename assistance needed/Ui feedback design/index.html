<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ui feedback design</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div class="container">
        <h4>How satisfied are you with our customer support performance?</h4>
        <div class="feedback">
            <p class="Unhappy">Unhappy</p>
            <p class="neutral">Neutral</p>
            <p class="satisfied active">Satisfied</p>
        </div>
        <button class="btn">Submit</button>

    </div>
    <script src="./main.js"></script>
</body>

</html>
