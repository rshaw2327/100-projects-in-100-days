<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink Water</title>
    <link rel="stylesheet" href="./main.css">
</head>

<body>
    <div class="container">
        <h1>Drink Water</h1>
        <h4>Goal: 2 litres</h4>
        <div class="big-jug">
            <div class="empty">
                <p>1.5 L</p>
                <span>Remained</span>
            </div>
            <div class="fill-water">
                <span>25%</span>
            </div>
        </div>
        <h4>Select how many glasses of water that you have drank</h4>
        <div class="small-jugs">
            <div class="little-j"data-index=1>250 <br>ml</div>
            <div class="little-j"data-index=2>250 <br>ml</div>
            <div class="little-j"data-index=3>250 <br>ml</div>
            <div class="little-j"data-index=4>250 <br>ml</div>
            <div class="little-j"data-index=5>250 <br>ml</div>
            <div class="little-j"data-index=6>250 <br>ml</div>
            <div class="little-j"data-index=7>250 <br>ml</div>
            <div class="little-j"data-index=8>250 <br>ml</div>
        </div>
    </div>

    <script src="./main.js"></script>

</body>

</html>
