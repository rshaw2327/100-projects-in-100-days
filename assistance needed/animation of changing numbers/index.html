<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated changing numbers</title>
    <link rel="stylesheet" href="./main.css">
</head>

<body>
    <div class="container">
        <div class="stats-container">
            <i class="fa-solid fa-briefcase fa-4x"></i>
            <span class="counter" data-ceil="15">15</span>
            <p>Work-experience</p>
        </div>
        <div class="stats-container">
            <i class="fa-solid fa-cloud fa-4x"></i>
            <span class="counter" data-ceil="267">267</span>
            <p>Websites made</p>
        </div>
        <div class="stats-container">
            <i class="fa-brands fa-apple fa-4x"></i>
            <span class="counter" data-ceil="30">30</span>
            <p>App s made</p>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/2a218ecf02.js" crossorigin="anonymous"></script>

    <script src="./main.js"></script>
</body>

</html>
