<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./main.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript</title>
  </head>
  <body>
    <h1>Hello</h1>
    <div>
      <section>
        <h1 id="heading">H1 with Id heading</h1>
        <p id="para">p with id para</p>
        <button id="btn">Button with id btn</button>
      </section>
      
      <section>
        <h1 class="heading">H1 with class heading</h1>
        <p class="para">p with class para</p>
        <button class="btn">button with class btn</button>
      </section>
      
      <section>
        <h1 class="heading">H1 with class heading</h1>
        <p class="para">p with class para</p>
        <button class="btn">button with class btn</button>
      </section>
    </div>

    <form action="">
      <input type="text" name="fname">
      <input type="text" name="lname">
    </form>

    <p class="pattern"></p>
    <script src="./script.js"></script>

    <!-- calculator -->

    <div class="container">
      <div class="calculator">
        <form>
          <div class="display">
            <input type="text" name="display">
          </div>
          <div>
            <input type="button" value="AC" onclick="display.value=''">
            <input type="button" value="DE" onclick="display.value= display.value.toString().slice (0,-1)">
            <input type="button" value="." onclick="display.value+='.'">
            <input type="button" value="/" onclick="display.value+='/'">
          </div>
          <div>
            <input type="button" value="7" onclick="display.value+='7'">
            <input type="button" value="8" onclick="display.value+='8'">
            <input type="button" value="9" onclick="display.value+='9'">
            <input type="button" value="*" onclick="display.value+='*'">
          </div>
          <div>
            <input type="button" value="4" onclick="display.value+='4'">
            <input type="button" value="5" onclick="display.value+='5'">
            <input type="button" value="6" onclick="display.value+='6'">
            <input type="button" value="-" onclick="display.value+='-'">
          </div>
          <div>
            <input type="button" value="1" onclick="display.value+='1'">
            <input type="button" value="2" onclick="display.value+='2'">
            <input type="button" value="3" onclick="display.value+='3'">
            <input type="button" value="+" onclick="display.value+='+'">
          </div>
          <div>
            <input type="button" value="0" onclick="display.value+='0'">
            <input type="button" value="00" onclick="display.value+='00'">
            <input class="equal" type="button" value="="  onclick="display.value=eval(display.value)" >
            
          </div>

        </form>
      </div>

    </div>
  </body>
</html>
