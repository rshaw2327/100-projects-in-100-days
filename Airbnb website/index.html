<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="form">
        <form id="form">
            <label for="host_id">Host_id</label>
            <input type="number" placeholder="enter your id" name="host_id" >
            <label for="room_type">Room type</label>
            <input type="text" placeholder="Room type" name="room_type">
            <label for="country">Country</label>
            <input type="text" placeholder="enter your country" name="country">
            <label for="bedrooms">Bedrooms</label>
            <input type="number" placeholder="enter no. of bedrooms" name="bedrooms">
            <label for="city">City</label>
            <input type="text" placeholder="enter your city" name="city">
            <label for="price">Price</label>
            <input type="number" placeholder="enter price" name="price">

            <button type="submit" class="btn">Submit</button>


        </form>
    </div>
<script src="./main.js"></script>

</body>

</html>
