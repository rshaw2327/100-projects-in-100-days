<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy bird</title>
    <style>
        body {
            background-color: skyblue;
        }

        .bird {
            height: 100px;
            width: 150px;
            background-color: yellow;
            position: absolute;
            border-radius: 50%;
            top: calc(50% - 50px);
            left: calc(50% - 75px);
            transition-duration: 0.2s;
            animation-name: fall;
            animation-duration: 2s;
            animation-iteration-count: infinite
        }

        @keyframes fall {
            0% {
                top:calc(50% - 50px);
            }
            100% {
                top:calc(100% - 120px);
            }
            
        }

        .eyes {
            height: 40px;
            width: 40px;
            background-color: aquamarine;
            position: absolute;
            border-radius: 50%;
            top: 10px;
            left: 110px;

        }

        .eyes-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            background-color: black;
            position: absolute;
            top: 15px;
            left: 15px;
        }

        .lips {
            position: absolute;
            top: 50px;
            left: 85px;

        }

        .ul {
            height: 15px;
            width: 70px;
            background-color: red;
            border-radius: 10px;
            border: 2px solid black;

        }

        .ll {
            height: 15px;
            width: 70px;
            background-color: red;
            border-radius: 10px;
            border: 2px solid black;
        }

        .wings {
            height: 25px;
            width: 80px;
            background-color: yellowgreen;
            border-radius: 10px;
            position: absolute;
            top: 50px;
            left: -10px;
            animation-name: flying;
            animation-duration: 0.3s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes flying {
            0% {
                height: 40px;
                transform: translateY(-30px);
            }

            100% {
                height: 25px;
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body>
    <div class="bird">
        <div class="eyes">
            <div class="eyes-dot"></div>
        </div>
        <div class="lips">
            <div class="ul"></div>
            <div class="ll"></div>
        </div>
        <div class="wings"></div>
    </div>
    <script>
        const birdEl = document.querySelector(".bird");
        let y = 50;

        document.addEventListener("click", movingbird)

        function movingbird() {
            y -= 10;
            birdEl.style.top = `${y}px`;
        }







    </script>

</body>

</html>
